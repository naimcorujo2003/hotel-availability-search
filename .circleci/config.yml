version: 2.1

orbs:
  codecov: codecov/codecov@4.0.1

jobs:
  build-and-test:
    docker:
      - image: maven:3.9.9-eclipse-temurin-21
    steps:
      - checkout
      - restore_cache:
          keys:
            - maven-deps-{{ checksum "pom.xml" }}
            - maven-deps-
      - run:
          name: Run tests and generate coverage
          command: cd hotelsearch && mvn verify -DskipITs
      - save_cache:
          paths:
            - ~/.m2
          key: maven-deps-{{ checksum "pom.xml" }}
      - codecov/upload:
          file: hotelsearch/target/site/jacoco/jacoco.xml
          token: CODECOV_TOKEN  
      - store_test_results:
          path: hotelsearch/target/surefire-reports
      - store_artifacts:
          path: hotelsearch/target/site/jacoco
          destination: coverage-report

workflows:
  build-test:
    jobs:
      - build-and-test