version: '3.8'

services:

  oracle-dev:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-dev
    environment:
      ORACLE_PWD: hotel_pass
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oracle-dev-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
    
  oracle-test:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-test
    environment:
      ORACLE_PWD: hotel_pass
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1522:1521"
    volumes:
      - oracle-test-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: 
     - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka
    depends_on: 
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_availability-search
    depends_on:
      oracle-dev:
        condition: service_healthy
      kafka: 
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      ORACLE_USER: hotel_user
      ORACLE_PASSWORD: hotel_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-dev:1521/XEPDB1

volumes:
  oracle-dev-data:
    driver: local
  oracle-test-data:
    driver: local

