services:

  oracle-dev:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-dev
    environment:
      ORACLE_PWD: hotel_pass
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oracle-dev-data:/opt/oracle/oradata
      - ./init-db.sql:/opt/oracle/scripts/startup/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -s sys/hotel_pass@localhost:1521/XEPDB1 as sysdba <<< 'SELECT 1 FROM DUAL;'"]
      interval: 15s
      timeout: 15s
      retries: 30
      start_period: 180s
    
  oracle-test:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-test
    environment:
      ORACLE_PWD: hotel_pass
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1522:1521"
    volumes:
      - oracle-test-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s hotel_user/hotel_pass@localhost:1521/XEPDB1"]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 120s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: 
     - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka
    depends_on: 
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_availability-search
    restart: on-failure:5
    depends_on:
      oracle-dev:
        condition: service_healthy
      kafka: 
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_USERNAME: hotel_user
      SPRING_DATASOURCE_PASSWORD: hotel_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-dev:1521/XEPDB1
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.OracleDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  oracle-dev-data:
    driver: local
  oracle-test-data:
    driver: local

