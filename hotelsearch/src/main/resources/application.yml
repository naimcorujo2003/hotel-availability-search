spring:
    application:
        name: hotel-availability-search

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
        username: ${ORACLE_USER:hotel_user}
        password: ${ORACLE_PASSWORD:hotel_pass}
        driver-class-name: oracle.jdbc.OracleDriver

    jpa:
        hibernate: 
            ddl-auto: update
        properties:
            hibernate:
                dialect:  org.hibernate.dialect.OracleDialect
        show-sql: false
        database-platform: org.hibernate.dialect.OracleDialect
    
    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        consumer:
            group-id: hotel-availability-group
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                "[spring.json.trusted.packages]": "com.riu.hotels.hotel_availability_search.infrastructure.kafka"

springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui.html

server:
    port: 8080